name: bam
options:
  bundleIdPrefix: me.harke
  deploymentTarget:
    macOS: "14.4"
  createIntermediateGroups: true
packages:
  BamKit:
    path: BamKit
targets:
  bam:
    type: application
    platform: macOS
    sources:
      - path: App
      - path: bam.yaml
        buildPhase: resources
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: Better Audio Mixer
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSUIElement: true
        LSMinimumSystemVersion: "14.4"
        LSApplicationCategoryType: public.app-category.music
        NSAudioCaptureUsageDescription: "bam captures audio from other apps to display live level meters."
        NSHighResolutionCapable: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: me.harke.bam
        PRODUCT_MODULE_NAME: bam
        MARKETING_VERSION: "0.9.9"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: "6.0"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: App/bam.entitlements
        ENABLE_HARDENED_RUNTIME: YES
      configs:
        # Debug gets its own bundle id + name so the dev build runs side-by-side
        # with the Release copy installed in /Applications.
        debug:
          PRODUCT_BUNDLE_IDENTIFIER: me.harke.bam.dev
          PRODUCT_NAME: "bam dev"
    dependencies:
      - package: BamKit
        product: BamCore
      - package: BamKit
        product: AudioEngine
      - package: BamKit
        product: BamControlKit
  bamTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.4"
    sources:
      - path: AppTests
    dependencies:
      - target: bam
      - package: BamKit
        product: BamCore
      - package: BamKit
        product: AudioEngine
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: me.harke.bamTests
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "6.0"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/bam dev.app/Contents/MacOS/bam dev"
        BUNDLE_LOADER: "$(TEST_HOST)"
schemes:
  bam:
    build:
      targets:
        bam: all
        bamTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - bamTests
