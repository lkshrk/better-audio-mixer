name: bam
options:
  bundleIdPrefix: me.harke
  deploymentTarget:
    macOS: "14.4"
  createIntermediateGroups: true
packages:
  BamKit:
    path: BamKit
targets:
  bam:
    type: application
    platform: macOS
    sources:
      - path: App
      - path: bam.yaml
        buildPhase: resources
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: Better Audio Mixer
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSUIElement: true
        LSMinimumSystemVersion: "14.4"
        LSApplicationCategoryType: public.app-category.music
        NSAudioCaptureUsageDescription: "bam captures audio from other apps to display live level meters."
        NSHighResolutionCapable: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: me.harke.bam
        PRODUCT_MODULE_NAME: bam
        MARKETING_VERSION: "0.9.9"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: "6.0"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: App/bam.entitlements
        ENABLE_HARDENED_RUNTIME: YES
      configs:
        # Debug gets its own bundle id + name so the dev build runs side-by-side
        # with the Release copy installed in /Applications.
        debug:
          PRODUCT_BUNDLE_IDENTIFIER: me.harke.bam.dev
          PRODUCT_NAME: "bam dev"
    dependencies:
      - package: BamKit
        product: BamCore
      - package: BamKit
        product: AudioEngine
      - package: BamKit
        product: BamControlKit
  bamTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.4"
    sources:
      - path: AppTests
    dependencies:
      - target: bam
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: me.harke.bamTests
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "6.0"
        TEST_HOST: ""
        BUNDLE_LOADER: ""
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "\"$(BUILT_PRODUCTS_DIR)/bam dev.app/Contents/MacOS\""
        HEADER_SEARCH_PATHS:
          - "$(inherited)"
          - "\"$(PROJECT_TEMP_DIR)/../../../SourcePackages/checkouts/Yams/Sources/CYaml/include\""
          - "\"$(PROJECT_TEMP_DIR)/../../../SourcePackages/checkouts/swift-atomics/Sources/_AtomicsShims/include\""
        OTHER_SWIFT_FLAGS:
          - "$(inherited)"
          - "-Xcc"
          - "\"-fmodule-map-file=$(PROJECT_TEMP_DIR)/../../../SourcePackages/checkouts/Yams/Sources/CYaml/include/module.modulemap\""
          - "-Xcc"
          - "\"-fmodule-map-file=$(PROJECT_TEMP_DIR)/../../../SourcePackages/checkouts/swift-atomics/Sources/_AtomicsShims/include/module.modulemap\""
        OTHER_LDFLAGS:
          - "\"$(BUILT_PRODUCTS_DIR)/bam dev.app/Contents/MacOS/bam dev.debug.dylib\""
schemes:
  bam:
    build:
      targets:
        bam: all
        bamTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - bamTests
      postActions:
        - name: Cleanup bam test host
          settingsTarget: bam
          script: |
            if [ -n "$BUILT_PRODUCTS_DIR" ]; then
              /usr/bin/pkill -f "$BUILT_PRODUCTS_DIR/bam dev.app/Contents/MacOS/[b]am dev" || true
            fi
