name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    env:
      DEVELOPMENT_TEAM: ${{ secrets.DEVELOPMENT_TEAM }}
      SIGNING_IDENTITY: ${{ secrets.SIGNING_IDENTITY }}
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Import signing certificate
        env:
          CERT_P12: ${{ secrets.DEVELOPER_ID_CERT_P12 }}
          CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN=$RUNNER_TEMP/signing.keychain-db
          echo "$CERT_P12" | base64 --decode > $RUNNER_TEMP/cert.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import $RUNNER_TEMP/cert.p12 -k "$KEYCHAIN" -P "$CERT_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security list-keychain -d user -s "$KEYCHAIN" $(security list-keychain -d user | tr -d '"')

      - name: Generate project
        run: xcodegen generate

      - name: Build & sign (Developer ID)
        run: |
          xcodebuild -project bam.xcodeproj -scheme bam \
            -configuration Release -derivedDataPath .build \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="$SIGNING_IDENTITY" \
            DEVELOPMENT_TEAM="$DEVELOPMENT_TEAM" \
            OTHER_CODE_SIGN_FLAGS="--timestamp --options runtime" \
            build

      - name: Package
        run: |
          APP=".build/Build/Products/Release/bam.app"
          ditto -c -k --sequesterRsrc --keepParent "$APP" bam.zip

      - name: Notarize & staple
        id: pkg
        env:
          NOTARY_KEY_P8: ${{ secrets.NOTARY_KEY_P8 }}
          NOTARY_KEY_ID: ${{ secrets.NOTARY_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.NOTARY_ISSUER_ID }}
        run: |
          APP=".build/Build/Products/Release/bam.app"
          echo "$NOTARY_KEY_P8" | base64 --decode > $RUNNER_TEMP/notary.p8
          xcrun notarytool submit bam.zip \
            --key $RUNNER_TEMP/notary.p8 \
            --key-id "$NOTARY_KEY_ID" \
            --issuer "$NOTARY_ISSUER_ID" \
            --wait
          xcrun stapler staple "$APP"
          rm bam.zip
          ditto -c -k --sequesterRsrc --keepParent "$APP" bam.zip
          echo "sha256=$(shasum -a 256 bam.zip | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" bam.zip \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            --notes "sha256: \`${{ steps.pkg.outputs.sha256 }}\`"

      - name: Bump Homebrew tap
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SHA="${{ steps.pkg.outputs.sha256 }}"
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/lkshrk/homebrew-tap.git" tap
          mkdir -p tap/Casks
          cp Casks/bam.rb tap/Casks/bam.rb
          sed -i '' -E "s/version \".*\"/version \"${VERSION}\"/" tap/Casks/bam.rb
          sed -i '' -E "s/sha256 \".*\"/sha256 \"${SHA}\"/" tap/Casks/bam.rb
          cd tap
          if ! git diff --quiet Casks/bam.rb; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add Casks/bam.rb
            git commit -m "bam: bump to ${VERSION}"
            git push
          fi
